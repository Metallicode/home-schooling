<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Letters: Focus Mode</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #0b0c10; padding: 10px; color: #66fcf1;
            margin: 0; height: 100vh; box-sizing: border-box; overflow: hidden;
            text-align: center;
        }
        
        h1 { color: #45a29e; font-size: 2.5rem; text-shadow: 2px 2px 0px #000; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        p { font-size: 16px; color: #c5c6c7; margin: 5px 0 15px 0;}

        /* --- THE SPACE CANVAS --- */
        #game-container {
            background: radial-gradient(circle at bottom, #1f2833 0%, #0b0c10 100%);
            border: 4px solid #45a29e; border-radius: 20px;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.2), inset 0 0 50px #000;
            width: 100%; max-width: 800px; height: 100%; max-height: 700px;
            position: relative; overflow: hidden;
            user-select: none; touch-action: none;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            pointer-events: none; opacity: 0.5;
        }

        /* --- HUD (Heads Up Display) --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; box-sizing: border-box; z-index: 20;
            pointer-events: none;
        }

        .hud-box {
            background: rgba(31, 40, 51, 0.8); border: 2px solid #45a29e;
            padding: 10px 20px; border-radius: 15px; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5); color: #fff;
        }

        #target-display {
            font-size: 40px; color: #66fcf1; text-transform: lowercase;
            text-shadow: 0 0 10px #66fcf1;
        }

        #score-val { color: #66bb6a; transition: transform 0.1s; display: inline-block; }
        #timer-val { color: #ffca28; }

        /* --- OVERLAYS --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.9); z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        .overlay-card {
            background: #1f2833; border: 4px solid #45a29e; border-radius: 20px;
            padding: 40px; box-shadow: 0 0 40px rgba(69, 162, 158, 0.4);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .overlay-title { font-size: 36px; color: #66fcf1; margin: 0; }
        .overlay-text { font-size: 24px; color: #c5c6c7; margin: 0; }
        
        .giant-letter {
            font-size: 100px; color: #fff; text-shadow: 0 0 20px #66fcf1;
            margin: -10px 0; font-weight: bold;
        }

        .action-btn {
            background: #45a29e; color: #0b0c10; border: none; border-radius: 15px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #1f2833; transition: all 0.1s; text-transform: uppercase;
        }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #1f2833; }
        .action-btn:hover { background: #66fcf1; }

        /* --- FALLING LETTERS --- */
        #play-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        .falling-letter {
            position: absolute; font-weight: bold; color: #fff;
            cursor: crosshair; user-select: none;
            display: flex; justify-content: center; align-items: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            will-change: transform, top;
        }

        .zap-anim {
            pointer-events: none;
            animation: zap 0.3s ease-out forwards;
        }
        @keyframes zap {
            0% { transform: scale(1); filter: brightness(1) blur(0); opacity: 1; }
            50% { transform: scale(2); filter: brightness(2) blur(5px); color: #66fcf1; }
            100% { transform: scale(0); opacity: 0; }
        }

    </style>
</head>
<body>

<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>

    <h1>🚀 Astro Letters 🚀</h1>
    <p>Hover your mouse over the target letters to zap them!</p>

    <div id="game-container">
        <div id="hud">
            <div class="hud-box">⭐ <span id="score-val">0</span></div>
            <div class="hud-box" id="target-display">?</div>
            <div class="hud-box">⏱️ <span id="timer-val">60</span>s</div>
        </div>

        <div id="play-area"></div>

        <div id="start-screen" class="overlay">
            <div class="overlay-card">
                <h2 class="overlay-title">Mission Briefing</h2>
                <p class="overlay-text">Your target for this run is:</p>
                <div class="giant-letter" id="start-target-letter">a</div>
                <button class="action-btn" onclick="startRun()">Start Run</button>
            </div>
        </div>

        <div id="end-screen" class="overlay hidden">
            <div class="overlay-card">
                <h2 class="overlay-title">Time's Up!</h2>
                <p class="overlay-text">You successfully zapped</p>
                <div class="giant-letter" id="final-score">0</div>
                <p class="overlay-text">target letters!</p>
                <button class="action-btn" onclick="initRound()">Next Mission</button>
            </div>
        </div>
    </div>

<script>
    function initAudio() {}

    function playLaser(letter) {
        const audio = new Audio(`sounds/${letter}.wav`);
        audio.play();
    }

    const alphabet = 'abcdefghijklmnopqrstuvwxyz';
    let targetLetter = 'a';
    let score = 0;
    let timeLeft = 60;
    let isPlaying = false;
    
    let activeLetters = []; 
    let animationId;
    let spawnIntervalId;
    let timerIntervalId;

    const playArea = document.getElementById('play-area');
    const scoreVal = document.getElementById('score-val');
    const timerVal = document.getElementById('timer-val');
    const targetDisplay = document.getElementById('target-display');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const startTargetLetter = document.getElementById('start-target-letter');
    const finalScore = document.getElementById('final-score');
    const gameContainer = document.getElementById('game-container');

    function generateStars() {
        for(let i=0; i<50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random() * 0.5 + 0.2;
            gameContainer.appendChild(star);
        }
    }
    
    window.onload = () => {
        generateStars();
        initRound();
    };

    function initRound() {
        targetLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
        startTargetLetter.innerText = targetLetter;
        targetDisplay.innerText = targetLetter;
        
        endScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
    }

    function startRun() {
        initAudio();
        startScreen.classList.add('hidden');
        
        score = 0;
        timeLeft = 60;
        scoreVal.innerText = score;
        timerVal.innerText = timeLeft;
        
        playArea.innerHTML = '';
        activeLetters = [];
        isPlaying = true;

        if (animationId) cancelAnimationFrame(animationId);
        physicsLoop();

        if (spawnIntervalId) clearInterval(spawnIntervalId);
        spawnIntervalId = setInterval(spawnLetter, 400);

        if (timerIntervalId) clearInterval(timerIntervalId);
        timerIntervalId = setInterval(() => {
            timeLeft--;
            timerVal.innerText = timeLeft;
            if (timeLeft <= 10) timerVal.style.color = '#ef5350'; 
            else timerVal.style.color = '#ffca28';

            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        isPlaying = false;
        clearInterval(spawnIntervalId);
        clearInterval(timerIntervalId);
        cancelAnimationFrame(animationId);
        
        finalScore.innerText = score;
        endScreen.classList.remove('hidden');
    }

    function spawnLetter() {
        if (!isPlaying) return;

        const isTarget = Math.random() < 0.3;
        let charToSpawn = targetLetter;
        
        if (!isTarget) {
            do {
                charToSpawn = alphabet[Math.floor(Math.random() * alphabet.length)];
            } while (charToSpawn === targetLetter); 
        }

        const size = Math.floor(Math.random() * 40) + 30; 
        const speed = (Math.random() * 2) + 1.5; 
        const containerWidth = gameContainer.offsetWidth;
        const xPos = Math.random() * (containerWidth - size - 20) + 10; 

        const el = document.createElement('div');
        el.className = 'falling-letter';
        el.innerText = charToSpawn;
        el.style.fontSize = size + 'px';
        el.style.left = xPos + 'px';
        el.style.top = '-50px'; 

        el.style.opacity = Math.random() * 0.4 + 0.6; 
        if (Math.random() < 0.2) el.style.color = '#c5c6c7'; 

        // Trigger interaction purely on hover
        el.onpointerover = (e) => handleLetterInteraction(e, el, charToSpawn);

        playArea.appendChild(el);

        activeLetters.push({
            el: el,
            x: xPos,
            y: -50,
            speed: speed,
            char: charToSpawn,
            zapped: false
        });
    }

    function handleLetterInteraction(e, el, char) {
        if (!isPlaying) return;

        const letterObj = activeLetters.find(l => l.el === el);
        // If it's already been zapped, ignore
        if (!letterObj || letterObj.zapped) return;

        // Only react if it is the correct letter (silent failure for wrong letters)
        if (char === targetLetter) {
            playLaser(targetLetter);
            score++;
            scoreVal.innerText = score;
            
            letterObj.zapped = true;
            el.classList.add('zap-anim');
            
            scoreVal.style.transform = 'scale(1.5)';
            setTimeout(() => scoreVal.style.transform = 'scale(1)', 150);
            
            setTimeout(() => { if (el.parentNode) el.remove(); }, 300);
        }
    }

    function physicsLoop() {
        if (!isPlaying) return;

        const containerHeight = gameContainer.offsetHeight;

        for (let i = activeLetters.length - 1; i >= 0; i--) {
            const letter = activeLetters[i];
            
            if (letter.zapped) continue; 

            // Move down
            letter.y += letter.speed;
            letter.el.style.transform = `translateY(${letter.y + 50}px)`;

            // Check if off screen
            if (letter.y > containerHeight + 50) {
                letter.el.remove();
                activeLetters.splice(i, 1);
            }
        }

        animationId = requestAnimationFrame(physicsLoop);
    }
</script>
</body>
</html>
