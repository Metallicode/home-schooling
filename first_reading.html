    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #e0f2f1; padding: 20px; color: #004d40;
            margin: 0; min-height: 100vh; box-sizing: border-box; text-align: center;
        }
        
        h1 { color: #00796b; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin: 0 0 10px 0; }
        p { font-size: 18px; color: #00695c; font-weight: bold; margin: 0 0 30px 0; max-width: 600px;}

        .card {
            background: white; padding: 40px; border-radius: 25px; 
            border: 5px solid #80cbc4; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 40px;
        }

        /* --- SENTENCE DISPLAY --- */
        #sentence-display {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 15px;
            min-height: 150px; align-items: center;
        }

        .word {
            font-size: 60px; font-weight: bold; color: #004d40;
            padding: 5px 15px; border-radius: 15px; cursor: pointer;
            transition: all 0.2s; border: 3px solid transparent;
        }

        .word:hover {
            background: #e0f2f1; border-color: #4db6ac; color: #00796b;
            transform: translateY(-5px); box-shadow: 0 5px 0 #4db6ac;
        }
        
        /* Highlight state for ElevenLabs playback */
        .word.playing {
            background: #fff59d; border-color: #fbc02d; color: #f57f17;
            transform: scale(1.1); box-shadow: 0 5px 15px rgba(251, 192, 45, 0.4);
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%;
        }

        .play-btn {
            background: #29b6f6; color: white; border: none; border-radius: 20px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #0288d1; transition: all 0.1s; flex: 1; min-width: 200px;
        }
        .play-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #0288d1; }
        .play-btn:disabled { background: #90caf9; box-shadow: 0 6px 0 #64b5f6; cursor: wait;}

        .next-btn {
            background: #66bb6a; color: white; border: none; border-radius: 20px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #43a047; transition: all 0.1s; flex: 1; min-width: 200px;
        }
        .next-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #43a047; }

    </style>
</head>

    let sentenceQueue = [];
    let currentSentence = "";
    let hoverTimer;
    let currentAudio = null;
    const audioCache = new Map(); // session cache: text -> Audio object

    function getAudio(text) {
        if (!audioCache.has(text)) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q=${encodeURIComponent(text)}`;
            const audio = new Audio(url);
            audio.preload = 'auto';
            audioCache.set(text, audio);
        }
        return audioCache.get(text);
    }

    const sentenceDisplayEl = document.getElementById('sentence-display');
    const fullReadBtn = document.getElementById('full-read-btn');

    // --- LOGIC ---
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function getNextSentence() {
        // If the queue is empty, fill it with a fresh shuffled batch
        if (sentenceQueue.length === 0) {
            sentenceQueue = shuffle([...predefinedSentences]);
            
            // Prevent the first sentence of the new batch from matching the very last sentence they just read
            if (sentenceQueue[0] === currentSentence) {
                sentenceQueue.push(sentenceQueue.shift());
            }
        }
        return sentenceQueue.shift();
    }

    function loadNextSentence() {
        if (currentAudio) currentAudio.pause(); // Stop any playing audio

        currentSentence = getNextSentence();
        renderSentence(currentSentence);
    }

    function renderSentence(sentence) {
        sentenceDisplayEl.innerHTML = '';
        const words = sentence.split(" ");

        words.forEach(wordText => {
            const span = document.createElement('span');
            span.className = 'word';
            span.innerText = wordText;

            // Strip punctuation before sending to audio reader
            const cleanWord = wordText.replace(/[^a-zA-Z]/g, "");

            // Prefetch word audio into cache
            if (cleanWord) getAudio(cleanWord);

            // Hover logic with debounce
            span.onmouseenter = () => {
                clearTimeout(hoverTimer);
                hoverTimer = setTimeout(() => {
                    playSingleWord(cleanWord);
                }, 150);
            };
            span.onmouseleave = () => clearTimeout(hoverTimer);

            sentenceDisplayEl.appendChild(span);
        });

        // Prefetch full sentence audio into cache
        getAudio(sentence);
    }

    // --- CLOUD AUDIO LOGIC ---
    function playSingleWord(word) {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }

        currentAudio = getAudio(word);
        currentAudio.currentTime = 0;
        currentAudio.play().catch(e => console.error("Audio play blocked by browser. Click the screen first.", e));
    }

    function playFullSentence() {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }

        currentAudio = getAudio(currentSentence);
        currentAudio.currentTime = 0;

        const wordSpans = document.querySelectorAll('.word');
        wordSpans.forEach(span => span.classList.add('playing'));

        currentAudio.onended = () => {
            wordSpans.forEach(span => span.classList.remove('playing'));
        };

        currentAudio.play().catch(e => console.error("Audio play blocked by browser. Click the screen first.", e));
    }

    // Initialize first load
    window.onload = loadNextSentence;
