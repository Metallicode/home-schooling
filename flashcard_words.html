<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Dynamo: Multi-Level</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #e8f5e9; padding: 20px; color: #1b5e20;
            margin: 0; height: 100vh; box-sizing: border-box; overflow: hidden;
            text-align: center;
        }
        
        h1 { color: #388e3c; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; }
        p { font-size: 18px; color: #4caf50; font-weight: bold; margin-top: 0; margin-bottom: 20px;}

        .game-board {
            background: white; padding: 40px; border-radius: 25px; 
            border: 5px solid #a5d6a7; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            position: relative; z-index: 10;
        }

        /* Speed Indicator */
        #speed-indicator {
            position: absolute; top: -20px; background: #81c784; color: white;
            padding: 8px 25px; border-radius: 20px; font-size: 20px; font-weight: bold;
            box-shadow: 0 4px 0 #66bb6a; border: 4px solid #fff; transition: all 0.3s;
            opacity: 0; transform: translateY(10px);
        }
        .show-fast { opacity: 1 !important; transform: translateY(0) !important; background: #4fc3f7 !important; box-shadow: 0 4px 0 #29b6f6 !important; }
        .show-review { opacity: 1 !important; transform: translateY(0) !important; background: #ffb74d !important; box-shadow: 0 4px 0 #f57c00 !important; }

        /* Level Controls */
        .controls {
            display: flex; justify-content: center; gap: 15px; width: 100%;
            background: #f1f8e9; padding: 15px; border-radius: 15px; box-sizing: border-box;
        }

        .mode-btn {
            background: #ffffff; color: #388e3c; border: 3px solid #a5d6a7; border-radius: 12px;
            padding: 10px 20px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #a5d6a7; transition: all 0.1s;
        }
        .mode-btn:active, .mode-btn.active { 
            transform: translateY(5px); box-shadow: 0 0px 0 #a5d6a7; 
            background: #81c784; border-color: #4caf50; color: #fff;
        }

        /* The Word Display */
        #word-display {
            font-size: 100px; font-weight: bold; color: #2e7d32;
            letter-spacing: 5px; margin: 10px 0; min-height: 140px;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; text-transform: lowercase;
        }

        /* Action Button */
        #next-btn {
            background-color: #66bb6a; color: white; border: none; border-radius: 20px;
            padding: 20px 60px; font-size: 32px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 0 #43a047; transition: all 0.1s; text-transform: uppercase;
            width: 80%; display: none; /* Hidden until a mode is selected */
        }
        #next-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #43a047; }
        
        /* Stop accidental double-clicks */
        .locked { background-color: #bdbdbd !important; box-shadow: 0 8px 0 #9e9e9e !important; cursor: not-allowed !important;}

        #progress-text { font-size: 18px; color: #81c784; font-weight: bold; }

    </style>
</head>
<body>

<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>

    <h1>⚡ Flashcard Dynamo ⚡</h1>
    <p>Select your level, read the word out loud, then click NEXT!</p>

    <div class="game-board">
        <div id="speed-indicator">Speed: Fast! 🚀</div>
        
        <div class="controls">
            <button class="mode-btn" onclick="setMode(3)">3 Letters</button>
            <button class="mode-btn" onclick="setMode(4)">4 Letters</button>
            <button class="mode-btn" onclick="setMode(5)">5 Letters</button>
        </div>

        <div id="word-display">Pick a Level!</div>

        <button id="next-btn" onclick="handleNext()">NEXT ➡️</button>

        <div id="progress-text">Ready to learn...</div>
    </div>

<script>
    // --- AUDIO ENGINE ---
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function playFastSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playReviewSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function playStartSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- WORD DICTIONARIES (Top 50 high-frequency words by length) ---
    const wordLists = {
        3: [
            "the", "and", "you", "was", "for", "are", "his", "out", "had", "him", 
            "her", "not", "all", "can", "but", "how", "who", "did", "get", "day", 
            "may", "way", "one", "use", "has", "two", "see", "its", "let", "put", 
            "say", "too", "boy", "old", "any", "new", "our", "men", "man", "now", 
            "off", "top", "big", "red", "sun", "hot", "cat", "dog", "run", "sit"
        ],
        4: [
            "that", "with", "have", "this", "will", "your", "from", "they", "know", "want", 
            "been", "good", "much", "some", "time", "very", "when", "come", "here", "just", 
            "like", "long", "make", "many", "more", "only", "over", "such", "take", "than", 
            "them", "well", "were", "what", "year", "back", "down", "even", "give", "into", 
            "look", "most", "then", "also", "made", "must", "said", "work", "part", "play"
        ],
        5: [
            "there", "their", "about", "which", "would", "these", "other", "words", "could", "write", 
            "first", "water", "after", "where", "right", "think", "three", "years", "place", "sound", 
            "great", "again", "still", "every", "small", "found", "never", "under", "might", "while", 
            "house", "world", "below", "asked", "going", "large", "until", "along", "shall", "being", 
            "often", "earth", "began", "since", "study", "night", "light", "above", "paper", "those"
        ]
    };

    let wordQueue = [];
    let currentWord = "";
    let wordStartTime = 0;
    let currentMode = 0; // 3, 4, or 5

    // DOM Elements
    const wordDisplay = document.getElementById('word-display');
    const nextBtn = document.getElementById('next-btn');
    const speedIndicator = document.getElementById('speed-indicator');
    const progressText = document.getElementById('progress-text');

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function setMode(letters) {
        initAudio();
        playStartSound();
        currentMode = letters;
        
        // Update UI Buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.innerText.startsWith(letters)) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        // Setup Queue
        wordQueue = shuffle([...wordLists[letters]]);
        progressText.innerText = `Top 50 ${letters}-Letter Words`;
        
        nextBtn.style.display = 'block'; // Show next button
        showNextWord();
    }

    function showNextWord() {
        currentWord = wordQueue.shift();
        wordDisplay.innerText = currentWord;
        
        wordDisplay.style.transform = "scale(0.8)";
        setTimeout(() => wordDisplay.style.transform = "scale(1)", 50);

        wordStartTime = Date.now();
        
        nextBtn.classList.add('locked');
        nextBtn.disabled = true;
        setTimeout(() => {
            nextBtn.classList.remove('locked');
            nextBtn.disabled = false;
        }, 400);
    }

    function handleNext() {
        const readTime = Date.now() - wordStartTime;

        // Dynamic threshold scaling: longer words get more time to still be considered "Fast"
        let threshold = 2500; // default for 3 letters
        if (currentMode === 4) threshold = 3000;
        if (currentMode === 5) threshold = 3500;

        if (readTime <= threshold) {
            // FAST! Put at the back.
            wordQueue.push(currentWord);
            playFastSound();
            showFeedback("Speed: Fast! 🚀", "show-fast");
        } else {
            // SLOW! Re-insert 4 spots away.
            const insertIndex = Math.min(4, wordQueue.length);
            wordQueue.splice(insertIndex, 0, currentWord);
            playReviewSound();
            showFeedback("Needs Review 🔄", "show-review");
        }

        showNextWord();
    }

    function showFeedback(text, cssClass) {
        speedIndicator.innerText = text;
        speedIndicator.className = ''; 
        void speedIndicator.offsetWidth; 
        speedIndicator.classList.add(cssClass);
        
        setTimeout(() => {
            speedIndicator.classList.remove(cssClass);
        }, 1000);
    }

</script>
</body>
</html>
