<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Math Mantra: Reward Shelf</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #e8eaf6; padding: 20px; color: #283593;
            margin: 0; min-height: 100vh; box-sizing: border-box; text-align: center;
        }
        
        h1 { color: #3f51b5; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin: 0 0 10px 0; }
        p { font-size: 18px; color: #5c6bc0; font-weight: bold; margin: 0 0 20px 0; max-width: 600px;}

        .card {
            background: white; padding: 40px 30px; border-radius: 25px; 
            border: 5px solid #9fa8da; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; gap: 30px;
        }

        /* --- THE MATH DISPLAY --- */
        #math-display {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            font-size: 90px; font-weight: bold; white-space: nowrap;
            transition: transform 0.1s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .num1 { color: #ec407a; } 
        .operator { color: #9e9e9e; font-size: 70px; margin: 0 5px;} 
        .num2 { color: #29b6f6; } 
        .answer { color: #66bb6a; } 
        .negative { color: #ab47bc; } /* Special color for negative answers to make them pop */

        /* --- THE BUTTON --- */
        .next-btn {
            background: #5c6bc0; color: white; border: none; border-radius: 20px;
            padding: 20px 60px; font-size: 32px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 0 #3949ab; transition: all 0.1s; text-transform: uppercase;
        }
        .next-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #3949ab; }
        .locked { background-color: #bdbdbd !important; box-shadow: 0 8px 0 #9e9e9e !important; cursor: not-allowed !important;}

        /* --- PROGRESS BAR --- */
        .progress-container {
            display: flex; gap: 8px; margin-top: 10px;
        }
        .dot {
            width: 15px; height: 15px; border-radius: 50%; background: #e0e0e0;
            transition: background 0.3s, transform 0.3s;
        }
        .dot.filled { background: #ffca28; transform: scale(1.2); box-shadow: 0 0 5px #ffca28;}

        /* --- THE TREAT SHELF --- */
        .shelf-container {
            width: 100%; margin-top: 20px;
        }
        .shelf-plank {
            background: #8d6e63; height: 20px; border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.2);
            position: relative; margin-top: -10px; z-index: 1;
        }
        .treats-display {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;
            min-height: 60px; padding: 0 20px; z-index: 2; position: relative;
        }
        .treat {
            font-size: 50px; animation: dropIn 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            transform-origin: bottom center;
        }

        @keyframes dropIn {
            0% { transform: translateY(-50px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <h1>🧠 The Math Mantra 🧠</h1>
    <p>Read the sentence out loud! Every 10 pages, you earn a sweet treat for your shelf.</p>

    <div class="card">
        
        <div id="math-display">
            <span class="num1" id="val1">1</span>
            <span class="operator" id="op">+</span>
            <span class="num2" id="val2">1</span>
            <span class="operator">=</span>
            <span class="answer" id="valAns">2</span>
        </div>
        
        <button class="next-btn" id="next-btn" onclick="nextFact()">Next ➡️</button>

        <div class="progress-container" id="progress-dots">
            </div>

        <div class="shelf-container">
            <div class="treats-display" id="treats-display"></div>
            <div class="shelf-plank"></div>
        </div>

    </div>

<script>
    // --- AUDIO ENGINE ---
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function playPop() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playTada() {
        if (!audioCtx) return;
        const notes = [400, 500, 600, 800]; // Happy upward chord
        notes.forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }, i * 100);
        });
    }

    // --- MATH FACT GENERATOR ---
    let factQueue = [];
    
    function generateFacts() {
        let facts = [];
        // Generate facts using digits 1 through 5
        for (let a = 1; a <= 5; a++) {
            for (let b = 1; b <= 5; b++) {
                // Add Addition fact
                facts.push({ a: a, b: b, op: '+', ans: a + b });
                // Add Subtraction fact (This will naturally create negative numbers when a < b)
                facts.push({ a: a, b: b, op: '-', ans: a - b });
            }
        }
        return shuffle(facts);
    }

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function getNextFact() {
        if (factQueue.length === 0) {
            factQueue = generateFacts();
        }
        return factQueue.shift();
    }

    // --- GAME STATE & TREATS ---
    let readCount = 0;
    const treats = ['🍫', '🍪', '🍭', '🍦', '🍬', '🧁', '🍩', '🍰'];

    // DOM Elements
    const mathDisplayEl = document.getElementById('math-display');
    const val1El = document.getElementById('val1');
    const opEl = document.getElementById('op');
    const val2El = document.getElementById('val2');
    const valAnsEl = document.getElementById('valAns');
    const nextBtn = document.getElementById('next-btn');
    const progressDotsEl = document.getElementById('progress-dots');
    const treatsDisplayEl = document.getElementById('treats-display');

    // Build the 10 progress dots
    for(let i=0; i<10; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.id = `dot-${i}`;
        progressDotsEl.appendChild(dot);
    }

    function nextFact() {
        initAudio();
        
        // Progress Logic
        readCount++;
        const progressStep = readCount % 10;
        
        if (progressStep === 0) {
            // Reward Time! (Every 10th read)
            playTada();
            const randomTreat = treats[Math.floor(Math.random() * treats.length)];
            const treatEl = document.createElement('div');
            treatEl.className = 'treat';
            treatEl.innerText = randomTreat;
            treatsDisplayEl.appendChild(treatEl);
            
            // Reset dots
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('filled'));
        } else {
            // Normal read
            playPop();
            document.getElementById(`dot-${progressStep - 1}`).classList.add('filled');
        }

        // Load new math fact
        const fact = getNextFact();
        
        val1El.innerText = fact.a;
        opEl.innerText = fact.op;
        val2El.innerText = fact.b;
        
        // Handle Negative Formatting
        if (fact.ans < 0) {
            // Visually distinguish negative words/symbols if you want to teach it as "Negative Three"
            valAnsEl.innerText = fact.ans;
            valAnsEl.className = 'answer negative';
        } else {
            valAnsEl.innerText = fact.ans;
            valAnsEl.className = 'answer';
        }

        // Visual bounce to acknowledge the change
        mathDisplayEl.style.transform = "scale(0.85)";
        setTimeout(() => mathDisplayEl.style.transform = "scale(1)", 50);

        // Lock button briefly
        nextBtn.classList.add('locked');
        nextBtn.disabled = true;
        setTimeout(() => {
            nextBtn.classList.remove('locked');
            nextBtn.disabled = false;
        }, 300);
    }

    // Initialize first fact
    window.onload = () => {
        // We call nextFact, but override the first readCount so it starts at 0 properly
        readCount = -1; 
        nextFact();
    };

</script>
</body>
</html>
