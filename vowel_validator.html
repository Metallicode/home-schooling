<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vowel Validator: Anchors</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: #fff3e0; padding: 20px; color: #e65100;
            margin: 0; min-height: 100vh; box-sizing: border-box; text-align: center;
        }
        
        h1 { color: #ff6d00; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin: 0 0 10px 0; }
        p { font-size: 18px; color: #ef6c00; font-weight: bold; margin: 0 0 20px 0; max-width: 600px;}

        .card {
            background: white; padding: 40px; border-radius: 25px; 
            border: 5px solid #ffcc80; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        /* --- PLAY SCREEN --- */
        #target-vowel {
            font-size: 180px; font-weight: bold; color: #ff6d00;
            text-shadow: 4px 4px 0 #ffe082; margin: 10px 0 0 0; line-height: 1;
            transition: transform 0.1s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* The Anchor Image/Word */
        #anchor-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff8e1; padding: 15px 30px; border-radius: 20px; border: 3px dashed #ffe082;
            margin-bottom: 20px; min-width: 200px;
        }

        #anchor-icon { font-size: 60px; line-height: 1; margin-bottom: 5px; }
        #anchor-text { font-size: 24px; font-weight: bold; color: #f57c00; margin: 0;}

        .next-btn {
            background: #66bb6a; color: white; border: none; border-radius: 20px;
            padding: 20px 60px; font-size: 30px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 0 #43a047; transition: all 0.1s;
        }
        .next-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #43a047; }
        
        /* Prevent accidental double clicks */
        .locked { background-color: #bdbdbd !important; box-shadow: 0 8px 0 #9e9e9e !important; cursor: not-allowed !important;}

        /* Toggle hint visibility */
        .toggle-row {
            display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: bold; color: #ef6c00;
        }
        .toggle-row input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #ff6d00; }

    </style>
</head>
<body>

    <a href="index.html" style="position:fixed;top:12px;left:12px;z-index:999;background:white;color:#e65100;border:3px solid #ffcc80;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS',cursive;font-size:15px;font-weight:bold;text-decoration:none;box-shadow:0 3px 0 #ffcc80;">🏠 Home</a>
    <h1>🎤 The Vowel Validator 🎤</h1>
    <p>Look at the picture to remember the sound! When you say it perfectly, click Next!</p>

    <div class="card">
        
        <div id="target-vowel">A</div>
        
        <div id="anchor-container">
            <div id="anchor-icon">🍎</div>
            <div id="anchor-text">Apple</div>
        </div>
        
        <label class="toggle-row">
            <input type="checkbox" id="hide-hint-toggle" onchange="toggleHint()">
            Hide hint
        </label>

        <button class="next-btn" id="next-btn" onclick="nextLevel()">Next Vowel ➡️</button>

    </div>

<script>
    // --- AUDIO ENGINE (Just for a satisfying click sound) ---
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function playPop() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- STATE & ANCHOR DATA ---
    const vowels = ['A', 'E', 'I', 'O', 'U'];
    let currentVowel = 'A';
    
    // The dictionary mapping each vowel to its visual anchor (ALL SHORT VOWELS)
    const vowelAnchors = {
        'A': { icon: '🍎', word: 'Apple' },
        'E': { icon: '🥚', word: 'Egg' },
        'I': { icon: '🦎', word: 'Iguana' }, 
        'O': { icon: '🐙', word: 'Octopus' },
        'U': { icon: '🦄', word: 'Unicorn' }
    };
    
    // DOM Elements
    const anchorContainer = document.getElementById('anchor-container');
    const targetVowelEl = document.getElementById('target-vowel');
    const anchorIconEl = document.getElementById('anchor-icon');
    const anchorTextEl = document.getElementById('anchor-text');
    const nextBtn = document.getElementById('next-btn');

    // --- GAME LOGIC ---

    function getNextRandomVowel() {
        // Filter out the current vowel so it never repeats twice in a row
        const availableVowels = vowels.filter(v => v !== currentVowel);
        // Pick a random one from the remaining 4
        return availableVowels[Math.floor(Math.random() * availableVowels.length)];
    }

    function nextLevel() {
        initAudio();
        playPop();

        // Get new vowel and its anchor data
        currentVowel = getNextRandomVowel();
        const anchorData = vowelAnchors[currentVowel];

        // Update the UI
        targetVowelEl.innerText = currentVowel;
        anchorIconEl.innerText = anchorData.icon;
        anchorTextEl.innerText = anchorData.word;

        // Add a fun little bounce animation
        targetVowelEl.style.transform = "scale(0.8)";
        setTimeout(() => targetVowelEl.style.transform = "scale(1)", 50);

        // Lock button briefly to prevent accidental double-clicks skipping a letter
        nextBtn.classList.add('locked');
        nextBtn.disabled = true;
        setTimeout(() => {
            nextBtn.classList.remove('locked');
            nextBtn.disabled = false;
        }, 300);
    }

    function toggleHint() {
        const hide = document.getElementById('hide-hint-toggle').checked;
        anchorContainer.style.display = hide ? 'none' : 'flex';
    }

    // Initialize first random vowel on load
    window.onload = () => {
        currentVowel = vowels[Math.floor(Math.random() * vowels.length)];
        const anchorData = vowelAnchors[currentVowel];
        
        targetVowelEl.innerText = currentVowel;
        anchorIconEl.innerText = anchorData.icon;
        anchorTextEl.innerText = anchorData.word;
    };

</script>
</body>
</html>
