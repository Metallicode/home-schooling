<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Word Family Machine</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            background-color: #e3f2fd; padding: 20px; color: #1565c0;
            margin: 0; min-height: 100vh; box-sizing: border-box; text-align: center;
        }
        
        h1 { color: #1976d2; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin: 0 0 10px 0; }
        p { font-size: 18px; color: #1e88e5; font-weight: bold; margin: 0 0 20px 0;}

        /* --- FAMILY SELECTOR (TOP MENU) --- */
        .family-selector {
            display: flex; gap: 10px; max-width: 800px; flex-wrap: wrap; justify-content: center;
            background: #ffffff; padding: 15px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 3px solid #bbdefb;
            margin-bottom: 30px;
        }

        .family-btn {
            background: #e3f2fd; color: #1976d2; border: 3px solid #90caf9; border-radius: 15px;
            padding: 10px 20px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #90caf9; transition: all 0.1s;
        }
        .family-btn:active, .family-btn.active { 
            transform: translateY(4px); box-shadow: 0 0px 0 #90caf9; 
            background: #42a5f5; border-color: #1e88e5; color: #fff;
        }

        /* --- THE MAIN CARD --- */
        .card {
            background: white; padding: 40px; border-radius: 25px; 
            border: 5px solid #90caf9; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 30px;
        }

        /* --- WORD DISPLAY (Visual Chunking) --- */
        #word-display {
            font-size: 120px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s; user-select: none;
            background: #f5f5f5; padding: 20px 50px; border-radius: 20px; border: 3px dashed #e0e0e0;
        }
        #word-display:active { transform: scale(0.95); }

        .onset { color: #29b6f6; } /* The changing starting letter (Blue) */
        .rime { color: #ec407a; }  /* The locked ending chunk (Pink) */

        /* --- CONTROLS --- */
        .next-btn {
            background: #66bb6a; color: white; border: none; border-radius: 20px;
            padding: 20px 60px; font-size: 30px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 0 #43a047; transition: all 0.1s; text-transform: uppercase;
        }
        .next-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #43a047; }
        .locked { background-color: #bdbdbd !important; box-shadow: 0 8px 0 #9e9e9e !important; cursor: not-allowed !important;}

        .hint-text { font-size: 16px; color: #9e9e9e; margin-top: -10px; }

    </style>
</head>
<body>

    <a href="index.html" style="position:fixed;top:12px;left:12px;z-index:999;background:white;color:#1565c0;border:3px solid #90caf9;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS',cursive;font-size:15px;font-weight:bold;text-decoration:none;box-shadow:0 3px 0 #90caf9;">🏠 Home</a>
    <h1>🧩 The Word Family Machine 🧩</h1>
    <p>Pick an ending chunk. Watch how only the first letter changes!</p>

    <div class="family-selector" id="family-selector">
        </div>

    <div class="card">
        
        <div id="word-display" onclick="playCurrentWord()">
            <span class="onset" id="onset-display">c</span><span class="rime" id="rime-display">at</span>
        </div>
        <div class="hint-text">👆 Click the word to hear it out loud!</div>
        
        <button class="next-btn" id="next-btn" onclick="nextWord()">Next Word ➡️</button>

    </div>

<script>
    // --- THE WORD FAMILY DICTIONARY ---
    // The key is the 'Rime' (ending), the array contains the 'Onsets' (starting letters)
    const wordFamilies = {
        // A Families
        "at": ["b", "c", "f", "h", "m", "p", "r", "s", "v"],
        "an": ["c", "f", "m", "p", "r", "t", "v"],
        "ap": ["c", "g", "l", "m", "n", "t"],
        "am": ["h", "j", "p", "r", "s", "y"],
        "ag": ["b", "g", "r", "t", "w"],
        "ad": ["b", "d", "h", "m", "p", "s"],
        
        // E Families
        "et": ["b", "g", "j", "l", "m", "n", "p", "v", "w"],
        "en": ["d", "h", "m", "p", "t"],
        "ed": ["b", "f", "l", "r", "w"],
        
        // I Families
        "it": ["b", "f", "h", "k", "l", "p", "s"],
        "in": ["b", "f", "p", "t", "w"],
        "ig": ["b", "d", "f", "p", "r", "w"],
        "ip": ["d", "h", "l", "r", "s", "t", "z"],
        
        // O Families
        "ot": ["c", "d", "g", "h", "l", "n", "p"],
        "op": ["c", "h", "m", "p", "t"],
        "og": ["b", "d", "f", "h", "j", "l"],
        
        // U Families
        "ug": ["b", "d", "h", "j", "m", "p", "r"],
        "un": ["b", "f", "n", "r", "s"],
        "ub": ["c", "h", "r", "s", "t"]
    };

    // --- STATE VARIABLES ---
    let currentFamily = "at";
    let currentIndex = 0;
    let currentAudio = null;

    // DOM Elements
    const familySelectorEl = document.getElementById('family-selector');
    const onsetDisplayEl = document.getElementById('onset-display');
    const rimeDisplayEl = document.getElementById('rime-display');
    const wordDisplayEl = document.getElementById('word-display');
    const nextBtn = document.getElementById('next-btn');

    // --- INITIALIZATION ---
    window.onload = () => {
        // Build the menu buttons dynamically
        Object.keys(wordFamilies).forEach(family => {
            const btn = document.createElement('button');
            btn.className = 'family-btn';
            btn.innerText = `-${family}`;
            btn.id = `btn-${family}`;
            btn.onclick = () => selectFamily(family);
            familySelectorEl.appendChild(btn);
        });
        
        // Load the first family
        selectFamily("at");
    };

    // --- LOGIC ---
    function selectFamily(family) {
        // Update UI styling for buttons
        document.querySelectorAll('.family-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${family}`).classList.add('active');

        // Update state
        currentFamily = family;
        currentIndex = 0; // Reset to the first word in the new family
        
        renderWord();
    }

    function nextWord() {
        const onsets = wordFamilies[currentFamily];
        currentIndex++;
        
        // Loop back to the beginning if we hit the end of the family list
        if (currentIndex >= onsets.length) {
            currentIndex = 0;
        }

        renderWord();

        // Visual bounce & lock to prevent double clicks
        wordDisplayEl.style.transform = "scale(0.85)";
        setTimeout(() => wordDisplayEl.style.transform = "scale(1)", 50);

        nextBtn.classList.add('locked');
        nextBtn.disabled = true;
        setTimeout(() => {
            nextBtn.classList.remove('locked');
            nextBtn.disabled = false;
        }, 200);
    }

    function renderWord() {
        const onsets = wordFamilies[currentFamily];
        const currentOnset = onsets[currentIndex];

        // Update the display spans
        onsetDisplayEl.innerText = currentOnset;
        rimeDisplayEl.innerText = currentFamily;
    }

    // --- CLOUD AUDIO ---
    function playCurrentWord() {
        if (currentAudio) currentAudio.pause(); 
        
        const onsets = wordFamilies[currentFamily];
        const fullWord = onsets[currentIndex] + currentFamily;
        
        // Use Google TTS to read the full assembled word
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q=${encodeURIComponent(fullWord)}`;
        
        currentAudio = new Audio(url);
        currentAudio.play().catch(e => console.error("Audio block: Click the page first.", e));
    }

</script>
</body>
</html>
